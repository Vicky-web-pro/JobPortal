<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs - Admin - JobPortal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- Admin Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <a href="/"><span class="logo-icon"><i class="fas fa-briefcase"></i></span> JobPortal</a>
            </div>
            <span class="admin-badge">Admin</span>
        </div>
        
        <ul class="sidebar-menu">
            <li>
                <a href="/admin/dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/admin/add-job">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Job</span>
                </a>
            </li>
            <li class="active">
                <a href="/admin/manage-jobs">
                    <i class="fas fa-briefcase"></i>
                    <span>Manage Jobs</span>
                </a>
            </li>
            <li>
                <a href="/admin/applications">
                    <i class="fas fa-file-alt"></i>
                    <span>Applications</span>
                </a>
            </li>
            <li>
                <a href="/">
                    <i class="fas fa-home"></i>
                    <span>View Site</span>
                </a>
            </li>
            <li>
                <a href="/admin/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Admin Content -->
    <div class="admin-content">
        <!-- Top Header -->
        <div class="admin-header">
            <h1>Manage Jobs</h1>
            <a href="/admin/add-job" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add New Job
            </a>
        </div>

        <!-- Jobs Table -->
        <div class="admin-table-container">
            <div class="table-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search jobs...">
                </div>
            </div>

            <!-- Success Message -->
            <div class="alert alert-success" id="successMessage" style="display: none;">
                <i class="fas fa-check-circle"></i> <span id="successText"></span>
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger" id="errorMessage" style="display: none;">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Type</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="jobsTableBody">
                    <!-- Jobs will be loaded dynamically -->
                </tbody>
            </table>

            <!-- Loading State -->
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading jobs...
            </div>

            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <p>No jobs found</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Job</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="editJobForm">
                <input type="hidden" id="editJobId">
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="editCompany" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="editDepartment" required>
                </div>
                <div class="form-group">
                    <label>Job Role</label>
                    <input type="text" id="editJobRole" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="editLocation" required>
                </div>
                <div class="form-group">
                    <label>Job Type</label>
                    <select id="editJobType" required>
                        <option value="Full Time">Full Time</option>
                        <option value="Part Time">Part Time</option>
                        <option value="Contract">Contract</option>
                        <option value="Internship">Internship</option>
                        <option value="Freelance">Freelance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="text" id="editSalary" required>
                </div>
                <div class="form-group">
                    <label>Company Email</label>
                    <input type="email" id="editCompanyEmail" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" rows="4"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Job</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script>
        let allJobs = [];

        // Load jobs on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadJobs();
        });

        function loadJobs() {
            fetch('/api/jobs')
                .then(response => response.json())
                .then(data => {
                    allJobs = data;
                    displayJobs(data);
                    document.getElementById('loading').style.display = 'none';
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loading').innerHTML = '<p>Error loading jobs</p>';
                });
        }

        function displayJobs(jobs) {
            const tbody = document.getElementById('jobsTableBody');
            const noResults = document.getElementById('noResults');
            
            tbody.innerHTML = '';

            if (jobs.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            jobs.forEach(job => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${job.id}</td>
                    <td><strong>${job.title}</strong></td>
                    <td>${job.company}</td>
                    <td>${job.location}</td>
                    <td><span class="badge badge-primary">${job.job_type}</span></td>
                    <td>${job.salary}</td>
                    <td class="actions">
                        <button class="btn-icon btn-edit" onclick="editJob(${job.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="deleteJob(${job.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allJobs.filter(job => 
                job.title.toLowerCase().includes(searchTerm) ||
                job.company.toLowerCase().includes(searchTerm) ||
                job.location.toLowerCase().includes(searchTerm)
            );
            displayJobs(filtered);
        });

        // Edit job
        function editJob(jobId) {
            const job = allJobs.find(j => j.id === jobId);
            if (job) {
                document.getElementById('editJobId').value = job.id;
                document.getElementById('editTitle').value = job.title;
                document.getElementById('editCompany').value = job.company;
                document.getElementById('editDepartment').value = job.department;
                document.getElementById('editJobRole').value = job.job_role;
                document.getElementById('editLocation').value = job.location;
                document.getElementById('editJobType').value = job.job_type;
                document.getElementById('editSalary').value = job.salary;
                document.getElementById('editCompanyEmail').value = job.company_email;
                document.getElementById('editDescription').value = job.description || '';
                
                document.getElementById('editModal').style.display = 'flex';
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Update job
        document.getElementById('editJobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const jobId = document.getElementById('editJobId').value;
            const formData = {
                title: document.getElementById('editTitle').value,
                company: document.getElementById('editCompany').value,
                department: document.getElementById('editDepartment').value,
                job_role: document.getElementById('editJobRole').value,
                location: document.getElementById('editLocation').value,
                job_type: document.getElementById('editJobType').value,
                salary: document.getElementById('editSalary').value,
                company_email: document.getElementById('editCompanyEmail').value,
                description: document.getElementById('editDescription').value
            };

            fetch(`/api/update-job/${jobId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    closeModal();
                    loadJobs();
                    showMessage('Job updated successfully!', 'success');
                }
            })
            .catch(error => {
                showMessage('Error updating job', 'error');
            });
        });

        // Delete job
        function deleteJob(jobId) {
            if (confirm('Are you sure you want to delete this job?')) {
                fetch(`/api/delete-job/${jobId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        loadJobs();
                        showMessage('Job deleted successfully!', 'success');
                    }
                })
                .catch(error => {
                    showMessage('Error deleting job', 'error');
                });
            }
        }

        function showMessage(message, type) {
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            if (type === 'success') {
                document.getElementById('successText').textContent = message;
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';
            } else {
                document.getElementById('errorText').textContent = message;
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            }
            
            setTimeout(() => {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
            }, 3000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
