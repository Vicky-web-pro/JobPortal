<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job - Admin - JobPortal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- Admin Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <a href="/"><span class="logo-icon"><i class="fas fa-briefcase"></i></span> JobPortal</a>
            </div>
            <span class="admin-badge">Admin</span>
        </div>
        
        <ul class="sidebar-menu">
            <li>
                <a href="/admin/dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="/admin/add-job">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Job</span>
                </a>
            </li>
            <li>
                <a href="/admin/manage-jobs">
                    <i class="fas fa-briefcase"></i>
                    <span>Manage Jobs</span>
                </a>
            </li>
            <li>
                <a href="/admin/applications">
                    <i class="fas fa-file-alt"></i>
                    <span>Applications</span>
                </a>
            </li>
            <li>
                <a href="/">
                    <i class="fas fa-home"></i>
                    <span>View Site</span>
                </a>
            </li>
            <li>
                <a href="/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Admin Content -->
    <div class="admin-content">
        <!-- Top Header -->
        <div class="admin-header">
            <h1>Add New Job</h1>
            <div class="admin-user">
                <span>Welcome, Admin</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>

        <!-- Add Job Form -->
        <div class="admin-form-container">
            <!-- Success Message -->
            <div class="alert alert-success" id="successMessage" style="display: none;">
                <i class="fas fa-check-circle"></i> Job added successfully!
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger" id="errorMessage" style="display: none;">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>

            <form id="addJobForm" class="admin-form">
                <div class="form-section">
                    <h3>Job Details</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">
                                <i class="fas fa-briefcase"></i> Job Title *
                            </label>
                            <input type="text" id="title" name="title" placeholder="e.g. Software Developer" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="company">
                                <i class="fas fa-building"></i> Company Name *
                            </label>
                            <input type="text" id="company" name="company" placeholder="e.g. Google" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="department">
                                <i class="fas fa-layer-group"></i> Department *
                            </label>
                            <select id="department" name="department" required>
                                <option value="">Select Department</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Design">Design</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="Analytics">Analytics</option>
                                <option value="HR">HR</option>
                                <option value="Finance">Finance</option>
                                <option value="Operations">Operations</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="job_role">
                                <i class="fas fa-user-tie"></i> Job Role *
                            </label>
                            <input type="text" id="job_role" name="job_role" placeholder="e.g. Senior Developer" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">
                                <i class="fas fa-map-marker-alt"></i> Location *
                            </label>
                            <input type="text" id="location" name="location" placeholder="e.g. Bangalore, Karnataka" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="job_type">
                                <i class="fas fa-clock"></i> Job Type *
                            </label>
                            <select id="job_type" name="job_type" required>
                                <option value="">Select Job Type</option>
                                <option value="Full Time">Full Time</option>
                                <option value="Part Time">Part Time</option>
                                <option value="Contract">Contract</option>
                                <option value="Internship">Internship</option>
                                <option value="Freelance">Freelance</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="salary">
                                <i class="fas fa-money-b-wave"></i> Salary *
                            </label>
                            <input type="text" id="salary" name="salary" placeholder="e.g. ₹10,00,000 - ₹15,00,000" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="company_email">
                                <i class="fas fa-envelope"></i> Company Email *
                            </label>
                            <input type="email" id="company_email" name="company_email" placeholder="e.g. careers@company.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">
                            <i class="fas fa-align-left"></i> Job Description
                        </label>
                        <textarea id="description" name="description" rows="6" placeholder="Enter job description..."></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Job
                    </button>
                    <a href="/admin/dashboard" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script>
        document.getElementById('addJobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                department: document.getElementById('department').value,
                job_role: document.getElementById('job_role').value,
                location: document.getElementById('location').value,
                job_type: document.getElementById('job_type').value,
                salary: document.getElementById('salary').value,
                company_email: document.getElementById('company_email').value,
                description: document.getElementById('description').value
            };

            fetch('/api/add-job', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('errorMessage').style.display = 'none';
                    document.getElementById('addJobForm').reset();
                    
                    // Redirect after 2 seconds
                    setTimeout(function() {
                        window.location.href = '/admin/manage-jobs';
                    }, 1500);
                }
            })
            .catch(error => {
                document.getElementById('errorText').textContent = 'Something went wrong. Please try again.';
                document.getElementById('errorMessage').style.display = 'block';
            });
        });
    </script>
</body>
</html>
